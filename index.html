<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>边数据渲染器 (V1)</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="app">
    <header class="toolbar">
      <div class="controls">
        <label class="file-label" for="fileInput">选择 JSON 文件</label>
        <input id="fileInput" type="file" accept=".json,application/json" />
        <button id="resetViewBtn" type="button" disabled>重置视角</button>
        <input id="searchInput" type="text" placeholder="搜索标签..."
          style="margin-left: 12px; padding: 4px 8px; border: 1px solid #dbe3ee; border-radius: 4px; font-size: 13px;" />
        <button id="toggleLabelsBtn" type="button">隐藏标签</button>
      </div>
      <div class="status-wrap">
        <p id="status" class="status info">等待加载数据</p>
        <p id="stats" class="stats">点: 0 | 边: 0</p>
      </div>
    </header>

    <section class="viewer-container">
      <div class="viewer-pane">
        <h3 class="viewer-title">2D 参数空间 (U, V)</h3>
        <div class="viewer-wrap">
          <canvas id="viewerCanvas2D" aria-label="2D parameter space viewer"></canvas>
        </div>
      </div>
      <div class="viewer-pane">
        <h3 class="viewer-title">3D 曲面 (X, Y, Z)</h3>
        <div class="viewer-wrap">
          <canvas id="viewerCanvas3D" aria-label="3D edge viewer"></canvas>
        </div>
      </div>
    </section>

    <footer class="tips">
      左键拖动以平移 (2D) 或旋转 (3D)，滚轮缩放。点击边界线以在双视图间同步高亮。
    </footer>
  </main>

  <!-- 加载顺序：常量 → 解析 → 渲染 → 主逻辑 -->
  <script src="./constants.js"></script>
  <script src="./parser.js"></script>
  <script src="./viewer.js"></script>
  <script src="./main.js"></script>
</body>

</html>
